; PHP-FPM pool config for technical_ai
; Place in /etc/php/8.4/fpm/pool.d/technical_ai.conf

[technical_ai]
user = www-data
group = www-data
listen = /var/run/php/php8.4-fpm-technical_ai.sock
listen.owner = www-data
listen.group = www-data

; Process manager: dynamic scaling
pm = dynamic
pm.max_children = 20          ; Max simultaneous PHP processes
pm.start_servers = 4          ; Start with 4 (matches vCPU count)
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500         ; Restart workers after 500 requests (prevents memory leaks)

; Memory & limits
php_admin_value[memory_limit] = 256M
php_admin_value[upload_max_filesize] = 50M
php_admin_value[post_max_size] = 55M
php_admin_value[max_execution_time] = 120

; Logging
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/www/technical_ai/storage/logs/php-fpm-error.log

; Slow log for debugging
slowlog = /var/www/technical_ai/storage/logs/php-fpm-slow.log
request_slowlog_timeout = 10s
