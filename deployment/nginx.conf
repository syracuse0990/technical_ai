# HTTP server - certbot will automatically add SSL config
# After running: certbot --nginx -d digisaka.site
server {
    listen 80;
    server_name digisaka.site;
    root /var/www/technical_ai/public;

    index index.php;
    charset utf-8;

    # Upload limit (50MB for large PDFs/documents)
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Static assets (Vite build output) - long cache
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SSE streaming for chat - disable buffering
    location ~ ^/chat/\d+/stream$ {
        try_files $uri /index.php?$query_string;

        proxy_buffering off;
        proxy_cache off;
        fastcgi_buffering off;

        # SSE needs longer timeout
        fastcgi_read_timeout 120s;
    }

    # Main Laravel route
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm-technical_ai.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeouts
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
